server:
  port: 8060

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/dwz?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1
      timeout: 10000

short-url:
  host: http://localhost:8060
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

logging:
  level:
    top.naccl.dwz: info
